      <p class="page-subtitle">Here are some of my favorite charts from projects I've been working on lately!</p>

      <!-- Wide chart: full width -->
      <div class="chart-card chart-full">

      <div class="charts-grid" style="margin-top: 1rem;">

          <div class="chart-card">
            <img src="images/chart-foreign-top-startups.jpg" alt="Foreign workers overrepresented at top startups" style="object-fit: contain;" />
          </div>
        </div>

        <div class="chart-card" style="align-self: start;">
